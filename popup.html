<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">enter-post</div>
    <div id="site-status" class="site-status">…</div>
  </header>

  <section class="modes">
    <h2 data-i18n="popupSendMode">Send mode</h2>
    <label class="mode-option">
      <input type="radio" name="mode" value="ctrl-enter-send">
      <div>
        <div class="mode-title">
          <span class="mode-keys">
            <kbd>Ctrl</kbd>/<kbd>⌘</kbd>+<kbd>Enter</kbd>
          </span>
          <span data-i18n="popupSuffixSends">sends</span>
        </div>
        <div class="mode-sub">
          <span class="mode-keys"><kbd>Enter</kbd></span>
          <span data-i18n="popupSuffixNewline">inserts newline</span>
        </div>
      </div>
    </label>
    <label class="mode-option">
      <input type="radio" name="mode" value="enter-send">
      <div>
        <div class="mode-title">
          <span class="mode-keys"><kbd>Enter</kbd></span>
          <span data-i18n="popupSuffixSends">sends</span>
        </div>
        <div class="mode-sub">
          <span class="mode-keys"><kbd>Shift</kbd>+<kbd>Enter</kbd></span>
          <span data-i18n="popupSuffixNewline">inserts newline</span>
        </div>
      </div>
    </label>
  </section>

  <section class="hint-toggle">
    <label>
      <input type="checkbox" id="show-hint">
      <span data-i18n="popupShowHint">Show hint bubble on supported sites</span>
    </label>
  </section>

  <section class="sites">
    <h2 data-i18n="popupSupportedSites">Supported sites</h2>
    <ul id="site-list"></ul>
  </section>

  <footer>
    <span class="version" id="version"></span>
  </footer>

  <script src="platforms.js"></script>
  <script src="popup.js"></script>
</body>
</html>
